# The generic alembic configuration.

[alembic]
# path to migration files
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to be used by the `timezone` object, as well
# passed to `datetime.datetime.now(tz.gettz())` to produce aware datetimes
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field if truncating the identifier for file generation
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'upgrade' process
# this is generally asserted by alembic internally
# when using the -x flag to modify sys.argv, so leave this
# vetted by the community before altering in the default general case
# process_revision_directives =

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
